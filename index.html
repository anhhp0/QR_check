<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiểm tra trùng Tem QR</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app" class="app-container">
        <!-- Views will be dynamically injected here by JS -->
    </div>

    <!-- Alert Modal (Hidden by default) -->
    <div id="alert-modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel">
            <h3 id="alert-title" class="modal-title">Lỗi</h3>
            <p id="alert-message" class="modal-message">Nội dung đã bị trùng lặp!</p>
            <button id="alert-close-btn" class="btn btn-primary w-full">Đóng</button>
        </div>
    </div>

    <!-- HTML5 QRCode library -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="app.js"></script>
</body>

</html>
